<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TechMail — SMTP Email Client</title>
  <link rel="stylesheet" href="style.css" />

  <!-- EmailJS SDK -->
  <script
    type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
  </script>
  <script type="text/javascript">
    (function () {
      emailjs.init({
        publicKey: "YOUR_PUBLIC_KEY_HERE"  <!-- REPLACE THIS -->
      });
    })();
  </script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo-row">
        <div class="logo-dot"></div>
        
      </div>

      <nav class="nav-section">
        <span class="nav-title">MAILBOX</span>
        <ul>
          <li class="nav-item active" data-view="compose">
            <button type="button">Compose</button>
          </li>
          <li class="nav-item" data-view="sent">
            <button type="button">
              Sent <span class="badge" id="sent-count">0</span>
            </button>
          </li>
          <li class="nav-item" data-view="drafts">
            <button type="button">
              Drafts <span class="badge" id="draft-count">0</span>
            </button>
          </li>
        </ul>
      </nav>

      <nav class="nav-section">
        <span class="nav-title">SETTINGS</span>
        <ul>
          <li class="nav-item"><button type="button">SMTP Providers</button></li>
          <li class="nav-item"><button type="button">Help</button></li>
        </ul>
      </nav>
    </aside>

    <!-- Main panel -->
    <main class="compose-panel">
      <header class="top-bar">
        <div class="top-left">
          <h1>TechMail — SMTP Email Client</h1>
        </div>
        <div class="top-right">
          <span id="connection-status" class="status-dot">● Not connected</span>
          <button class="btn-secondary" id="test-smtp">⚡ Test SMTP</button>
          <button class="btn-primary" id="compose-btn"> Compose</button>
        </div>
      </header>

      <!-- COMPOSE VIEW -->
      <section class="view view-active" id="view-compose">
        <div class="compose-card">
          <div class="compose-header">
            <h2>New Message</h2>
          </div>

          <form id="compose-form" autocomplete="off">
            <div class="field">
              <label>To *</label>
              <input type="email" id="to" placeholder="recipient@example.com" required />
            </div>

            <div class="field-row">
              <div class="field">
                <label>CC</label>
                <input type="email" id="cc" placeholder="cc@example.com" />
              </div>
              <div class="field">
                <label>BCC</label>
                <input type="email" id="bcc" placeholder="bcc@example.com" />
              </div>
            </div>

            <div class="field">
              <label>Subject *</label>
              <input type="text" id="subject" placeholder="Email subject line" required />
            </div>

            <div class="field">
              <label>Message Body *</label>
              <textarea id="message" rows="12"
                placeholder="Write your message here..." required></textarea>
            </div>

            <div id="error-banner" class="banner error" style="display:none;">
              Please fill in the To address, Subject, and Message.
            </div>

            <div id="status-banner" class="banner" style="display:none;"></div>

            <div class="actions">
              <button type="submit" class="btn-primary">Send Email</button>
              <button type="button" class="btn-secondary" id="save-draft">
                Save Draft
              </button>
              <button type="button" class="btn-secondary" id="welcome-template">
                what to do
              </button>
            </div>
          </form>
        </div>
      </section>

      <!-- SENT VIEW -->
      <section class="view" id="view-sent">
        <div class="list-card">
          <h2>Sent Mail</h2>
          <p class="list-sub">Emails you have sent.</p>
          <ul id="sent-list" class="mail-list"></ul>
        </div>
      </section>

      <!-- DRAFTS VIEW -->
      <section class="view" id="view-drafts">
        <div class="list-card">
          <h2>Drafts</h2>
          <p class="list-sub">Saved drafts, click to continue editing.</p>
          <ul id="draft-list" class="mail-list"></ul>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
